apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwt-mock
  namespace: jwt-mock
  labels:
    app: jwt-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jwt-mock
  template:
    metadata:
      labels:
        app: jwt-mock
    spec:
      tolerations:
        - key: node-role
          operator: Equal
          value: ingress-cluster
          effect: NoSchedule
      containers:
        - name: jwt-mock
          image: europe-west1-docker.pkg.dev/gcp-poc-prod-cc/demo-images/jwt-mock:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: ISSUER_URL
              value: "http://jwt-mock.jwt-mock.svc.cluster.local:8080"
          resources:
            limits:
              memory: "128Mi"
              cpu: "200m"
            requests:
              memory: "64Mi"
              cpu: "50m"
          readinessProbe:
            httpGet:
              path: /.well-known/jwks.json
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
